name: tori
description: Tori - B2B2C Appointment Scheduling App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  firebase_messaging: ^15.1.0
  firebase_storage: ^12.1.3

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Maps (web-compatible)
  google_maps_flutter: ^2.7.0
  google_maps_flutter_web: ^0.5.9

  # Charts
  fl_chart: ^0.68.0

  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Animations
  rive: ^0.13.0
  animations: ^2.0.11

  # Utilities
  intl: ^0.20.0
  fpdart: ^1.1.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^3.0.0
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
